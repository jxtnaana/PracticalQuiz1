<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunbliss Garden</title>

  <!-- A-Frame 1.4.2 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>

  <style>
    /* ── global reset ── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a1a0a;
      overflow: hidden;
      font-family: Georgia, serif;
    }

    /* ── title badge (top-left) ── */
    #badge {
      position: fixed;
      top: 16px;
      left: 18px;
      z-index: 999;
      pointer-events: none;
      background: rgba(5, 45, 5, 0.68);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 220, 80, 0.30);
      border-radius: 16px;
      padding: 10px 22px 11px;
      color: #e8ffe0;
    }

    #badge h1 {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.55);
    }

    #badge p {
      font-size: 11px;
      font-style: italic;
      opacity: 0.72;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* ── nav hint (bottom-centre) ── */
    #hud {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.52);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 12px;
      padding: 7px 22px;
      border-radius: 30px;
      white-space: nowrap;
      letter-spacing: 0.4px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    a-scene {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

  <!-- ── overlays ── -->
  <div id="badge">
    <h1>🌻 Sunbliss Garden</h1>
    <p>A peaceful summer retreat</p>
  </div>
  <div id="hud">🖱 Drag to look around &nbsp;·&nbsp; W A S D to walk</div>


  <!-- ══════════════════════════════════════════════════════════════
     A-FRAME SCENE
══════════════════════════════════════════════════════════════ -->
  <a-scene background="color:#7EC8E3" renderer="antialias:true">

    <!-- ════════════════════════════════
       SKY  (gradient illusion via 2 layers)
  ════════════════════════════════ -->
    <!-- fff    -->
    <!-- ════ ASSET TEXTURES ════ -->
    <a-assets>
      <img id="tex-milo" src="milo.png">
      <img id="tex-milk" src="milk.jpg">
      <img src="metal.png" id="tex-metal">
      <img id="tex-table" src="table.jpg">
      <img id="tex-sea" src="sea.png">
      <img id="tex-sky" src="sky.jpg">
      <img id="tex-grass" src="grass.jpg">
      <img id="tex-face" src="face.png">
    </a-assets>

    <a-sky src="#tex-sky"></a-sky>

    <!-- ════════════════════════════════
       SUN + HALO GLOW
  ════════════════════════════════ -->

    <!-- Sun and clouds removed to display the custom sky texture -->


    <!-- ════════════════════════════════════════════════════════════
       FULL-COVERAGE FRESH GREEN GRASS FLOOR
       ─────────────────────────────────────────────────────────
       Layer 0 : ultra-wide base (ensures horizon stays green)
       Layer 1 : main bright lawn base  60×60
       Layer 2 : medium-green blend patches
       Layer 3 : dark-green depth/shadow patches
       Layer 4 : light sunlit-yellow-green highlights
       Layer 5 : grass blade clusters (tilted thin boxes)
       ALL stone/patio removed — 100% green!
  ════════════════════════════════════════════════════════════ -->

    <!-- LAYER 0 – ultra-wide safety base (stops bare ground showing at edges) -->
    <a-plane position="0 -0.001 -5" rotation="-90 0 0" width="120" height="120" color="#4CAF50" roughness="1"></a-plane>

    <!-- LAYER 0.5 – VAST SEA BACKGROUND (prevents empty void/distortion) -->
    <!-- Positioned slightly lower than the grass and far away, creating a horizon line -->
    <!-- The radius is massive (500) so it meets the sky dome seamlessly -->
    <a-circle position="0 -0.5 -100" rotation="-90 0 0" radius="500" src="#tex-sea" roughness="0.2" metalness="0.5" opacity="0.9"></a-circle>
    <!-- Add some light blue highlights/waves to the sea for depth -->
    <a-circle position="0 -0.49 -100" rotation="-90 0 0" radius="400" src="#tex-sea" roughness="0.3" metalness="0.4" opacity="0.6"></a-circle>

    <!-- LAYER 1 – TEXTURED GRASS -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="140" height="140" src="#tex-grass" repeat="20 20" roughness="0.8"></a-plane>

    <!-- ════════════════════════════════
       ROUND PATIO TABLE
       Table surface y = 1.045
  ════════════════════════════════ -->

    <!-- Table surface -->
    <a-cylinder position="0 1.0 -3" radius="1.1" height="0.08" src="#tex-table" roughness="0.85">
    </a-cylinder>
    <!-- Decorative edge rim -->
    <a-torus position="0 1.045 -3" radius="1.06" radius-tubular="0.032" src="#tex-table" roughness="0.85"
      rotation="90 0 0">
    </a-torus>
    <!-- Centre pedestal -->
    <a-cylinder position="0 0.5 -3" radius="0.065" height="1.0" src="#tex-table" roughness="0.85">
    </a-cylinder>
    <!-- Cross base arm 1 -->
    <a-box position="0 0.04 -3" width="1.5" height="0.07" depth="0.13" src="#tex-table" roughness="0.85"></a-box>
    <!-- Cross base arm 2 -->
    <a-box position="0 0.04 -3" width="0.13" height="0.07" depth="1.5" src="#tex-table" roughness="0.85"></a-box>


    <!-- ════════════════════════════════
       2 WOODEN CHAIRS
       LEFT  x=-1.65  rotation  90° → faces table
       RIGHT x= 1.65  rotation -90° → faces table
  ════════════════════════════════ -->

    <!-- ── CHAIR LEFT ── -->
    <a-entity position="-1.65 0 -3" rotation="0 90 0">
      <!-- Seat board -->
      <a-box position="0 0.55 0" width="0.68" height="0.08" depth="0.68" src="#tex-table" roughness="0.85"></a-box>
      <!-- Cushion -->
      <a-box position="0 0.60 0" width="0.60" height="0.06" depth="0.60" color="#C47A3A"></a-box>
      <!-- Front-left leg -->
      <a-box position="-0.28 0.27  0" width="0.07" height="0.55" depth="0.07" src="#tex-table" roughness="0.85"></a-box>
      <!-- Front-right leg -->
      <a-box position=" 0.28 0.27  0" width="0.07" height="0.55" depth="0.07" src="#tex-table" roughness="0.85"></a-box>
      <!-- Back-left leg -->
      <a-box position="-0.28 0.27  0.30" width="0.07" height="0.55" depth="0.07" src="#tex-table"
        roughness="0.85"></a-box>
      <!-- Back-right leg -->
      <a-box position=" 0.28 0.27  0.30" width="0.07" height="0.55" depth="0.07" src="#tex-table"
        roughness="0.85"></a-box>
      <!-- Backrest panel -->
      <a-box position="0 0.90 -0.30" width="0.68" height="0.58" depth="0.06" src="#tex-table" roughness="0.85"></a-box>
      <!-- Backrest top rail -->
      <a-box position="0 1.19 -0.30" width="0.68" height="0.06" depth="0.08" src="#tex-table" roughness="0.85"></a-box>
      <!-- Cross brace (lower) -->
      <a-box position="0 0.18  0.15" width="0.56" height="0.05" depth="0.05" src="#tex-table" roughness="0.85"></a-box>
    </a-entity>

    <!-- ── CHAIR RIGHT ── -->
    <a-entity position="1.65 0 -3" rotation="0 -90 0">
      <!-- Seat board -->
      <a-box position="0 0.55 0" width="0.68" height="0.08" depth="0.68" src="#tex-table" roughness="0.85"></a-box>
      <!-- Cushion -->
      <a-box position="0 0.60 0" width="0.60" height="0.06" depth="0.60" color="#C47A3A"></a-box>
      <!-- Front-left leg -->

      <a-box position=" 0.28 0.27  0" width="0.07" height="0.55" depth="0.07" src="#tex-table" roughness="0.85"></a-box>

      <!-- Backrest panel -->
      <a-box position="0 0.90 -0.30" width="0.68" height="0.58" depth="0.06" src="#tex-table" roughness="0.85"></a-box>
      <!-- Backrest top rail -->
      <a-box position="0 1.19 -0.30" width="0.68" height="0.06" depth="0.08" src="#tex-table" roughness="0.85"></a-box>
      <!-- Cross brace (lower) -->
      <a-box position="0 0.18  0.15" width="0.56" height="0.05" depth="0.05" src="#tex-table" roughness="0.85"></a-box>
    </a-entity>

    <!-- Knob stem -->
    <a-cylinder position="0 1.285 -3.0" radius="0.018" height="0.055" color="#C4AA80">
    </a-cylinder>
    <!-- Knob ball -->
    <a-sphere position="0 1.320 -3.0" radius="0.028" color="#D4BA90">
    </a-sphere>

    <!-- ── CUP 1 + SAUCER  (front-left) ── -->

    <a-cylinder position="-0.42 1.056 -3.45" radius="0.195" height="0.028" color="#D5CEBC">
    </a-cylinder>
    <!-- Saucer rim ring -->
    <a-torus position="-0.42 1.072 -3.45" radius="0.175" radius-tubular="0.012" color="#C4BDA8" rotation="90 0 0">

    </a-cylinder>
    <!-- Cup body -->
    <a-cylinder position="-0.42 1.185 -3.45" radius="0.100" height="0.200" color="#FFFAF0" roughness="0.15">
    </a-cylinder>
    <!-- Cup rim ring -->
    <a-torus position="-0.42 1.288 -3.45" radius="0.100" radius-tubular="0.010" color="#D8D0BB" rotation="90 0 0">
    </a-torus>
    <!-- Cup handle -->
    <a-box position="-0.265 1.190 -3.45" width="0.050" height="0.090" depth="0.025" color="#EDE6D0">
    </a-box>

    <!-- ── CUP 2 + SAUCER  (front-right) ── -->
    <!-- Saucer plate -->
    <a-cylinder position=" 0.42 1.056 -3.45" radius="0.195" height="0.028" color="#D5CEBC">
    </a-cylinder>
    <!-- Saucer rim ring -->
    <a-torus position=" 0.42 1.072 -3.45" radius="0.175" radius-tubular="0.012" color="#C4BDA8" rotation="90 0 0">

    <!-- Cup base foot -->

    <!-- ── SPOON 1  (beside Cup 1) ── -->
    <a-cylinder position="-0.660 1.060 -3.45" radius="0.014" height="0.260" color="#D0D0D0" rotation="0 0 12">
    </a-cylinder>
    <a-sphere position="-0.630 1.170 -3.45" radius="0.030" color="#E0E0E0" scale="1 0.55 1.3">
    </a-sphere>

    <!-- ── SPOON 2  (beside Cup 2) ── -->
    <a-cylinder position=" 0.660 1.060 -3.45" radius="0.014" height="0.260" color="#D0D0D0" rotation="0 0 -12">
    </a-cylinder>
    <a-sphere position=" 0.630 1.170 -3.45" radius="0.030" color="#E0E0E0" scale="1 0.55 1.3">
    </a-sphere>

    <!-- ── SMALL FLOWER VASE  (table decoration centre-right) ── -->
    <a-cylinder position=" 0.05 1.130 -2.58" radius="0.055" height="0.17" color="#7B5EA7" roughness="0.4">
    </a-cylinder>
    <a-cylinder position=" 0.05 1.225 -2.58" radius="0.040" height="0.06" color="#6A4F95">
    </a-cylinder>
    <!-- Flower stems -->
    <a-cylinder position=" 0.05 1.305 -2.58" radius="0.008" height="0.10" color="#2D6E1E"></a-cylinder>
    <a-cylinder position=" 0.08 1.305 -2.56" radius="0.008" height="0.10" color="#2D6E1E"
      rotation="0 0  8"></a-cylinder>
    <a-cylinder position=" 0.02 1.305 -2.60" radius="0.008" height="0.10" color="#2D6E1E"
      rotation="0 0 -8"></a-cylinder>
    <!-- Flower heads -->
    <a-sphere position=" 0.05 1.368 -2.58" radius="0.030" color="#FF69B4"></a-sphere>
    <a-sphere position=" 0.09 1.362 -2.56" radius="0.025" color="#FFD700"></a-sphere>
    <a-sphere position=" 0.01 1.362 -2.60" radius="0.025" color="#FF6347"></a-sphere>


    <!-- ════════════════════════════════════════════════════════
       PERSON  — standing just behind-right of the table
       Position: (1.1, 0, -4.3)   Rotation: (0, 155, 0)
       Built entirely from A-Frame primitives
       Height ≈ 1.75 m
