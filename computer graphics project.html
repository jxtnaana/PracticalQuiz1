<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sunbliss Garden Escape</title>

  <!-- A-Frame CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>

  <style>
    /* ── Reset ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #111;
      overflow: hidden;
    }

    /* ── Title badge — name only, no subtitle ── */
    #title-card {
      position: fixed;
      top: 16px;
      left: 18px;
      background: rgba(0, 0, 0, 0.50);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      padding: 10px 22px;
      border-radius: 14px;
      z-index: 999;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    #title-card h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.6px;
      white-space: nowrap;
    }

    /* ── Navigation hint bar ── */
    #hud {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.50);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      font-size: 12.5px;
      padding: 7px 22px;
      border-radius: 30px;
      pointer-events: none;
      letter-spacing: 0.4px;
      z-index: 999;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    /* ── Scene fills viewport ── */
    a-scene { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

  <!-- ── Overlays ── -->
  <div id="title-card">
    <h1>🌻 Sunbliss Garden Escape</h1>
  </div>
  <div id="hud">🖱 Drag to look &nbsp;·&nbsp; W A S D to walk</div>


  <!-- ══════════════════════════════════════════════════════════
       A-FRAME SCENE
  ══════════════════════════════════════════════════════════ -->
  <a-scene background="color:#87CEEB" renderer="antialias:true">

    <!-- ══════════════════════════════
         SKY
    ══════════════════════════════ -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- ══════════════════════════════
         SUN
    ══════════════════════════════ -->
    <a-sphere
      position="8 13 -20"
      radius="1.6"
      color="#FFD700"
      material="emissive:#FFD700;emissiveIntensity:0.6">
    </a-sphere>


    <!-- ══════════════════════════════════════════════════════
         LUSH SUMMER GRASS FLOOR
         ─────────────────────────────────────────────────────
         Layer 1 : Single wide base plane (bright lawn green)
         Layer 2 : Medium-green blending patches
         Layer 3 : Dark-green shadow / depth patches
         Layer 4 : Light-green sunlit highlight patches
         Layer 5 : Dense grass-blade clusters (thin tilted
                   boxes at varied rotations & shades)
    ══════════════════════════════════════════════════════════ -->

    <!-- LAYER 1 – Base lawn (bright summer green) -->
    <a-plane position="0 0 0" rotation="-90 0 0"
      width="60" height="60"
      color="#56A832" roughness="1">
    </a-plane>

    <!-- LAYER 2 – Medium blending patches -->
    <a-plane position=" 0   0.002  0"   rotation="-90 0 0" width="30" height="30" color="#4EA02E"></a-plane>

    <a-plane position="-4   0.002  6"   rotation="-90 0 0" width="10" height="12" color="#50A32E"></a-plane>

    <a-plane position="-7   0.003  4"   rotation="-90 0 0" width="9"  height="7"  color="#2E7D32"></a-plane>
